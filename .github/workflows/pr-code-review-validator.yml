name: PR Code Review Validator

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, labeled]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      ${{ !github.event.pull_request.draft &&
          (github.event.action != 'labeled' || github.event.label.name == 'full-review') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download prior violations artifact
        id: download-artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}-violations
          path: .review-artifacts/
        continue-on-error: true

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Detect review mode
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          EVENT_ACTION: ${{ github.event.action }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
          FULL_REVIEW_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'full-review') }}
          ARTIFACT_PATH: .review-artifacts/violations.json
        run: bash .github/scripts/detect-review-mode.sh

      - name: Clean up prior reviews
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: bash .github/scripts/cleanup-prior-reviews.sh

      - name: Run review pipeline
        id: pipeline
        env:
          ANTHROPIC_BEDROCK_BASE_URL: ${{ secrets.BEDROCK_BASE_URL }}
          ANTHROPIC_CUSTOM_HEADERS: "x-portkey-api-key:${{ secrets.PORTKEY_API_KEY }}\nx-portkey-provider:@aws-bedrock-use2"
          CLAUDE_CODE_USE_BEDROCK: "1"
          CLAUDE_CODE_SKIP_BEDROCK_AUTH: "1"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          REVIEW_MODE: ${{ steps.detect.outputs.review_mode }}
          ARTIFACT_PATH: .review-artifacts/violations.json
        run: bash .github/scripts/run-review-pipeline.sh

      - name: Post review to PR
        if: always() && steps.pipeline.outcome != 'cancelled'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PIPELINE_OUTCOME: ${{ steps.pipeline.outcome }}
          REVIEW_MODE: ${{ steps.detect.outputs.review_mode }}
          ARTIFACT_PATH: .review-artifacts/violations.json
        run: bash .github/scripts/post-review.sh

      - name: Upload violations artifact
        if: always() && steps.pipeline.outcome != 'cancelled'
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}-violations
          path: .review-artifacts/violations.json
          overwrite: true
          retention-days: 90
