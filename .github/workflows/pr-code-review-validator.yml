name: PR Code Review Validator

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for bot-only push
        id: skip_check
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          if [[ "$EVENT_ACTION" == "synchronize" ]] && [[ ! "$BEFORE_SHA" =~ ^0+$ ]]; then
            CHANGED_IN_PUSH=$(git diff --name-only "${BEFORE_SHA}..${AFTER_SHA}" 2>/dev/null || echo "")
            NON_REVIEW_FILES=$(echo "$CHANGED_IN_PUSH" | grep -v '^\.github/pr/' || true)
            if [[ -z "$NON_REVIEW_FILES" ]] && [[ -n "$CHANGED_IN_PUSH" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Skip: only review state files changed"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Claude Code CLI
        if: steps.skip_check.outputs.skip != 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Detect review mode
        if: steps.skip_check.outputs.skip != 'true'
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          EVENT_ACTION: ${{ github.event.action }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: bash .github/scripts/detect-review-mode.sh

      - name: Clean up prior reviews
        if: steps.skip_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: bash .github/scripts/cleanup-prior-reviews.sh

      - name: Run review pipeline
        if: steps.skip_check.outputs.skip != 'true'
        id: pipeline
        env:
          ANTHROPIC_BEDROCK_BASE_URL: ${{ secrets.BEDROCK_BASE_URL }}
          ANTHROPIC_CUSTOM_HEADERS: "x-portkey-api-key:${{ secrets.PORTKEY_API_KEY }}\nx-portkey-provider:@aws-bedrock-use2"
          CLAUDE_CODE_USE_BEDROCK: "1"
          CLAUDE_CODE_SKIP_BEDROCK_AUTH: "1"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          REVIEW_MODE: ${{ steps.detect.outputs.review_mode }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: bash .github/scripts/run-review-pipeline.sh

      - name: Commit review state
        if: always() && steps.skip_check.outputs.skip != 'true' && steps.pipeline.outcome != 'cancelled'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.head_ref }}
        run: bash .github/scripts/commit-review-state.sh

      - name: Post review to PR
        if: always() && steps.skip_check.outputs.skip != 'true' && steps.pipeline.outcome != 'cancelled'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PIPELINE_OUTCOME: ${{ steps.pipeline.outcome }}
          REVIEW_MODE: ${{ steps.detect.outputs.review_mode }}
        run: bash .github/scripts/post-review.sh
